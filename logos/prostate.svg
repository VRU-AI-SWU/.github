<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="pro" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22C3B0"/>
      <stop offset="1" stop-color="#0E7C8B"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="56" fill="url(#pro)"/>
  <!-- stacked MRI slices -->
  <g fill="#fff">
    <rect x="54" y="74" width="120" height="20" rx="10"/>
    <rect x="54" y="110" width="120" height="20" rx="10" opacity="0.78"/>
    <rect x="54" y="146" width="120" height="20" rx="10" opacity="0.56"/>
  </g>
  <!-- lesion crosshair target -->
  <circle cx="170" cy="170" r="36" fill="none" stroke="#fff" stroke-width="9"/>
  <circle cx="170" cy="170" r="11" fill="#fff"/>
  <g stroke="#fff" stroke-width="7" stroke-linecap="round">
    <line x1="170" y1="120" x2="170" y2="140"/>
    <line x1="170" y1="200" x2="170" y2="220"/>
    <line x1="120" y1="170" x2="140" y2="170"/>
    <line x1="200" y1="170" x2="220" y2="170"/>
  </g>
</svg>
